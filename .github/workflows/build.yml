name: Build and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Add apt repository for build tools
        run: sudo add-apt-repository 'deb http://mirrors.kernel.org/ubuntu focal-updates main'

      - name: Update package lists
        run: sudo apt update

      - name: Install build tools
        run: sudo apt install -y libcurl4-openssl-dev pkg-config build-essential

      - name: Run make
        run: make

      - name: Confirm success
        run: echo "Makefile executed successfully"
