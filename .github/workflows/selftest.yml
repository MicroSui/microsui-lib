name: Selftest

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Navigate to benchmark example directory
        run: cd examples/core_examples/benchmark

      - name: Run make
        run: make

      - name: Run benchmark
        run: ./benchmark

      - name: Confirm success
        run: echo "Selftest completed successfully"
